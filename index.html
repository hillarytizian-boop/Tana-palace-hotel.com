<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tana Palace Hotel – Hola | Luxury Stay in Tana Place Forest</title>
<meta name="description" content="Experience luxury and nature at Tana Palace Hotel, Hola. 4-star accommodation, fine dining, and conference facilities in the heart of Tana Place Forest.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
--primary-color:#0f3d32;
--accent-color:#c5a059;
--text-dark:#1a1a1a;
--text-light:#666;
--bg-light:#f9f9f9;
--white:#fff;
--transition:all .3s ease;
--shadow:0 10px 30px rgba(0,0,0,.08);
--radius:8px;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Lato',sans-serif;color:var(--text-dark);line-height:1.6;background:#fff;overflow-x:hidden;}
h1,h2,h3,h4{font-family:'Playfair Display',serif;color:var(--primary-color);}
a{text-decoration:none;color:inherit;transition:var(--transition);}
img{max-width:100%;display:block;object-fit:cover;}
ul{list-style:none;}
.container{max-width:1200px;margin:auto;padding:0 20px;}
.section-padding{padding:80px 0;}
.btn{display:inline-block;padding:12px 30px;border-radius:50px;font-weight:700;text-transform:uppercase;font-size:.9rem;cursor:pointer;border:none;}
.btn-primary{background:var(--accent-color);color:#fff;}
.btn-outline{border:2px solid var(--primary-color);color:var(--primary-color);background:transparent;}
.badge{display:inline-block;padding:5px 10px;background:#e8f5e9;color:#2e7d32;border-radius:4px;font-size:.8rem;font-weight:700;margin-top:10px;}
header{position:fixed;top:0;width:100%;z-index:1000;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);box-shadow:0 2px 10px rgba(0,0,0,.05);}
.nav-container{display:flex;justify-content:space-between;align-items:center;height:80px;}
.logo{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--primary-color);}
.nav-links{display:flex;gap:30px;}
.nav-links a{font-weight:600;font-size:.95rem;}
.nav-cta{display:flex;gap:15px;}
.mobile-toggle{display:none;font-size:1.5rem;cursor:pointer;}
.hero{position:relative;height:100vh;display:flex;align-items:center;justify-content:center;}
.hero-slider,.slide{position:absolute;width:100%;height:100%;}
.slide{opacity:0;background-size:cover;background-position:center;transition:opacity 1s;}
.slide.active{opacity:1;}
.slide::after{content:'';position:absolute;width:100%;height:100%;background:linear-gradient(rgba(0,0,0,.3),rgba(0,0,0,.6));}
.hero-content{position:relative;z-index:2;text-align:center;color:#fff;max-width:800px;padding:20px;}
.hero-content h1{font-size:3.5rem;color:#fff;margin-bottom:20px;}
.rating-stars{color:var(--accent-color);margin-bottom:10px;}
.booking-widget{background:#fff;padding:30px;border-radius:var(--radius);box-shadow:var(--shadow);margin-top:-80px;position:relative;z-index:10;}
.booking-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;align-items:end;}
.form-group{display:flex;flex-direction:column;gap:8px;}
.form-control{padding:12px;border:1px solid #ddd;border-radius:4px;}
.price-display{font-size:1.2rem;font-weight:700;color:var(--primary-color);margin-top:10px;display:none;}
.whatsapp-float{position:fixed;bottom:30px;right:30px;background:#25D366;color:#fff;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;z-index:100;}
.modal{display:none;position:fixed;width:100%;height:100%;top:0;background:rgba(0,0,0,.7);justify-content:center;align-items:center;z-index:2000;}
.modal-content{background:#fff;padding:40px;border-radius:8px;text-align:center;position:relative;}
.close-modal{position:absolute;top:15px;right:20px;font-size:1.5rem;cursor:pointer;}
@media(max-width:768px){
.nav-links,.nav-cta{display:none;}
.mobile-toggle{display:block;}
.hero-content h1{font-size:2.5rem;}
.booking-form{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<div class="container nav-container">
<a href="#" class="logo"><i class="fas fa-crown"></i> Tana Palace</a>
<ul class="nav-links">
<li><a href="#home">Home</a></li>
<li><a href="#rooms">Rooms</a></li>
<li><a href="#dining">Dining</a></li>
<li><a href="#conference">Conference</a></li>
<li><a href="#gallery">Gallery</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
<div class="nav-cta">
<a href="tel:0718100200" class="btn btn-outline">Call Now</a>
<a href="#book" class="btn btn-primary">Book Now</a>
</div>
<div class="mobile-toggle"><i class="fas fa-bars"></i></div>
</div>
</header>

<section id="home" class="hero">
<div class="hero-slider">
<div class="slide active" style="background-image:url('https://image.qwenlm.ai/public_source/1.png');"></div>
<div class="slide" style="background-image:url('https://image.qwenlm.ai/public_source/2.png');"></div>
<div class="slide" style="background-image:url('https://image.qwenlm.ai/public_source/3.png');"></div>
</div>
<div class="hero-content">
<div class="rating-stars"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
<h1>Tana Palace Hotel – Hola</h1>
<p>Experience unparalleled luxury nestled in the heart of Tana Place Forest.</p>
<span class="badge"><i class="fas fa-check-circle"></i> Open Now</span>
</div>
</section>

<div class="container">
<div class="booking-widget" id="book">
<form class="booking-form" id="bookingForm">
<div class="form-group">
<label>Check In</label>
<input type="date" class="form-control" id="checkin" required>
</div>
<div class="form-group">
<label>Check Out</label>
<input type="date" class="form-control" id="checkout" required>
</div>
<div class="form-group">
<label>Guests</label>
<select class="form-control">
<option>1 Guest</option>
<option selected>2 Guests</option>
<option>3 Guests</option>
<option>4 Guests</option>
</select>
</div>
<div class="form-group">
<label>Room Type</label>
<select class="form-control" id="roomType">
<option value="8000">Deluxe – 8,000</option>
<option value="12000">Executive – 12,000</option>
<option value="18000">Presidential – 18,000</option>
</select>
</div>
<div class="form-group">
<button type="submit" class="btn btn-primary">Check Availability</button>
</div>
</form>
<div class="price-display" id="priceDisplay"></div>
</div>
</div>

<div class="modal" id="confirmationModal">
<div class="modal-content">
<span class="close-modal" id="closeModal">&times;</span>
<h3>Booking Request Sent!</h3>
<p>Our team will contact you shortly to confirm your reservation.</p>
</div>
</div>

<a href="https://wa.me/254718100200" class="whatsapp-float" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<script>
const slides=document.querySelectorAll('.slide');
let currentSlide=0;
setInterval(()=>{slides[currentSlide].classList.remove('active');currentSlide=(currentSlide+1)%slides.length;slides[currentSlide].classList.add('active');},5000);

const bookingForm=document.getElementById('bookingForm');
const priceDisplay=document.getElementById('priceDisplay');
const modal=document.getElementById('confirmationModal');
const closeModal=document.getElementById('closeModal');

bookingForm.addEventListener('submit',function(e){
e.preventDefault();
const checkin=new Date(document.getElementById('checkin').value);
const checkout=new Date(document.getElementById('checkout').value);
const roomPrice=parseInt(document.getElementById('roomType').value);
if(checkout<=checkin){alert("Select valid dates");return;}
const nights=(checkout-checkin)/(1000*60*60*24);
const total=nights*roomPrice;
priceDisplay.style.display="block";
priceDisplay.innerHTML=`${nights} Night(s) × KES ${roomPrice.toLocaleString()}<br>Total: KES ${total.toLocaleString()}`;
modal.style.display="flex";
});
closeModal.onclick=()=>modal.style.display="none";
window.onclick=e=>{if(e.target==modal)modal.style.display="none";};

document.querySelector('.mobile-toggle').onclick=()=>{
const nav=document.querySelector('.nav-links');
nav.style.display=nav.style.display==="flex"?"none":"flex";
};
</script>

</body>
</html>
